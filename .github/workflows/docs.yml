name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from the Actions tab

# Allow only one concurrent deployment; cancel in-progress runs
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for mkdocs-material git-dates

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + docs dependencies
        run: |
          pip install -e ".[docs]"
          pip install scipy  # needed by generate_gallery.py

      - name: Regenerate gallery figures
        run: python docs/generate_gallery.py

      - name: Build docs (strict — fail on warnings)
        run: ~/.local/bin/mkdocs build --strict --verbose
        # Falls back to system path if mkdocs is on PATH
        # If this fails, try: python -m mkdocs build --strict

      - name: Upload pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
